name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "RobloxMultiInstance" main.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/RobloxMultiInstance.exe
          README.md
          LICENSE
        body: |
          ## Roblox Multi-Instance Launcher ${{ github.ref_name }}
          
          ### Installation
          1. Download `RobloxMultiInstance.exe`
          2. Run the executable (no installation needed)
          3. Click "Enable Multi-Instance" before launching Roblox
          
          ### Features
          - Run multiple Roblox instances simultaneously
          - System tray support
          - Simple toggle on/off
          
          ### Requirements
          - Windows 10/11
          - Roblox installed
          
          ### Notes
          - Windows Defender may flag the executable (false positive)
          - You may need to add an exception or run anyway
          - Source code is available for verification
          
          **Full Changelog**: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
